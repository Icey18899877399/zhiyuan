services:
  postgres:
    image: postgres:16-alpine
    container_name: zhiyuan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zhiyuan
      POSTGRES_PASSWORD: zhiyuan_dev_pwd
      POSTGRES_DB: zhiyuan
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zhiyuan -d zhiyuan"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
