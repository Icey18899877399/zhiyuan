services:
  postgres:
    # pgvector 官方镜像，等价于 postgres:16 + 预装 pgvector 扩展
    # 切换后无需改任何应用代码，只需在 migration 里 CREATE EXTENSION vector
    image: pgvector/pgvector:pg16
    container_name: zhiyuan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zhiyuan
      POSTGRES_PASSWORD: zhiyuan_dev_pwd
      POSTGRES_DB: zhiyuan
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zhiyuan -d zhiyuan"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
