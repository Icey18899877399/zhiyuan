<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每日数据 - 计算机学院 Agent 平台</title>
  <link rel="stylesheet" href="styles.css" />
  <script>
    // 防止深色模式闪烁的立即执行脚本
    (function() {
      const isDark = localStorage.getItem('darkMode') === 'true';
      if (isDark) {
        document.documentElement.classList.add('dark-chat');
      }
    })();
  </script>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo"></div>
        <h1>计网-智源 Agent</h1>
      </div>

      <nav class="menu">
        <a href="rag.html">RAG 知识库展示</a>
        <a href="identity.html">身份设置</a>
        <a href="daily.html" class="active">每日数据</a>
        <a href="index.html">对话</a>
      </nav>

      <div class="color-strip"></div>
    </aside>

    <main class="main">
      <h2 class="title"><span class="dot"></span>每日数据</h2>
      <div class="stats">
        <div class="toolbar">
          <label>选择日期：</label>
          <input id="datePicker" type="date" />
          <button class="save" id="loadData">查看</button>
        </div>

        <h3 style="margin-top:1.2rem">当日概览</h3>
        <div id="dailySummary" class="summary-grid"></div>

        <h3 style="margin-top:1.5rem">分爬虫巡查详情</h3>
        <table>
          <thead>
            <tr>
              <th>数据源</th>
              <th>巡查次数</th>
              <th>成功 / 失败</th>
              <th>抓取条目</th>
              <th>新增入库</th>
            </tr>
          </thead>
          <tbody id="dailyTable"></tbody>
        </table>

        <h3 style="margin-top:1.5rem">知识库更新日志（最近 20 次跑批）</h3>
        <div class="logs" id="crawlLogs"></div>
      </div>
    </main>
  </div>
  <script src="common.js"></script>
  <script src="daily.js"></script>
</body>
</html>
